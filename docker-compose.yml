version: "3.9"

services:
  aiops-bot:
    build: .
    image: aiops-bot:latest
    container_name: aiops-bot
    ports:
      - "8080:8080"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
