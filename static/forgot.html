<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resilo — Forgot password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --red:     #f85149;
      --font:    'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      font-size: 13px; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }
    .logo { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: .5px; margin-bottom: 8px; }
    .logo span { color: var(--muted); font-weight: 400; }
    .tagline { font-size: 11px; color: var(--muted); margin-bottom: 32px; letter-spacing: .5px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 28px 32px; width: 100%; max-width: 360px;
    }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .card-desc { font-size: 12px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 11px; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 5px; }
    input[type="email"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-family: var(--font);
      font-size: 13px; padding: 8px 10px; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    .btn-submit {
      width: 100%; background: var(--accent); border: none; border-radius: 5px;
      color: #0d1117; cursor: pointer; font-family: var(--font); font-size: 13px;
      font-weight: 700; margin-top: 8px; padding: 9px; transition: opacity .15s;
    }
    .btn-submit:hover:not(:disabled) { opacity: .88; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
    .footer { font-size: 11px; color: var(--muted); margin-top: 18px; text-align: center; }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .error-banner {
      background: rgba(248,81,73,.12); border: 1px solid rgba(248,81,73,.3);
      border-radius: 5px; color: var(--red); font-size: 11px;
      padding: 8px 12px; margin-bottom: 14px; display: none;
    }
    .error-banner.show { display: block; }
    /* Confirmation state */
    .confirm { display: none; text-align: center; padding: 8px 0; }
    .confirm-icon { font-size: 36px; margin-bottom: 12px; }
    .confirm-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .confirm-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>

<div class="logo">Resilo<span>AI</span></div>
<div class="tagline">AI-powered ops monitoring</div>

<div class="card">
  <div id="formState">
    <div class="card-title">Forgot your password?</div>
    <div class="card-desc">Enter your email and we'll send you a reset link.</div>

    <div class="error-banner" id="errorBanner">Something went wrong. Please try again.</div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" autofocus />
    </div>
    <button class="btn-submit" id="submitBtn" onclick="submit()">Send reset link</button>
  </div>

  <div class="confirm" id="confirmState">
    <div class="confirm-icon">📬</div>
    <div class="confirm-title">Check your email</div>
    <div class="confirm-desc">
      If that email address is registered, you'll receive a reset link shortly.<br><br>
      The link expires in 1 hour.
    </div>
  </div>

  <div class="footer">
    <a href="/login">← Back to login</a>
  </div>
</div>

<script>
async function submit() {
  const email = document.getElementById('email').value.trim();
  if (!email) return;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  document.getElementById('errorBanner').classList.remove('show');

  try {
    const res = await fetch('/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    if (!res.ok) throw new Error('server error');
    document.getElementById('formState').style.display = 'none';
    document.getElementById('confirmState').style.display = 'block';
  } catch {
    document.getElementById('errorBanner').classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
}

document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') submit();
});
</script>
</body>
</html>
