<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resilo — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #21262d;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --yellow:   #d29922;
      --red:      #f85149;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      height: 52px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: .5px; }
    .logo span { color: var(--muted); font-weight: 400; }
    .spacer { flex: 1; }
    .ts { font-size: 11px; color: var(--muted); }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      padding: 4px 10px;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* ── Workspace (two-column when detail open) ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Left column: monitors ── */
    .monitors-col {
      flex: 1;
      min-width: 300px;
      overflow-y: auto;
      padding: 20px;
      transition: max-width .2s ease;
    }
    .workspace.detail-open .monitors-col {
      max-width: 400px;
      border-right: 1px solid var(--border);
    }

    /* ── Section heading ── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      color: var(--text);
    }

    /* ── Add monitor form ── */
    .add-monitor-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field label { font-size: 10px; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }
    .form-field input, .form-field select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      min-width: 130px;
    }
    .form-field input:focus, .form-field select:focus { border-color: var(--accent); }
    .form-field input[name="url"] { min-width: 220px; }
    .btn-add {
      background: var(--accent);
      border: none;
      border-radius: 5px;
      color: #0d1117;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 16px;
      white-space: nowrap;
    }
    .btn-add:hover { opacity: .88; }
    .btn-add:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Monitor cards ── */
    .monitor-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .monitor-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      position: relative;
      transition: border-color .15s, background .15s;
      border-left: 3px solid transparent;
    }
    .monitor-card:hover { border-color: var(--accent); }
    .monitor-card.selected { border-color: var(--accent); background: #1c2230; }
    .monitor-card.up   { border-left-color: var(--green); }
    .monitor-card.down { border-left-color: var(--red); }
    .monitor-card.unknown { border-left-color: var(--border); }
    .monitor-card.selected.up   { border-color: var(--accent); border-left-color: var(--green); }
    .monitor-card.selected.down { border-color: var(--accent); border-left-color: var(--red); }

    .monitor-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .monitor-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .status-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .5px;
      padding: 2px 7px; border-radius: 3px; flex-shrink: 0;
    }
    .status-badge.up      { background: rgba(63,185,80,.15);  color: var(--green); }
    .status-badge.down    { background: rgba(248,81,73,.15);  color: var(--red); }
    .status-badge.unknown { background: var(--surface2); color: var(--muted); }

    .monitor-url   { font-size: 11px; color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 3px; }
    .monitor-meta  { display: flex; gap: 14px; font-size: 10px; color: var(--muted); margin-top: 5px; }
    .monitor-error { font-size: 10px; color: var(--red); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .btn-delete {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; color: transparent;
      cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 3px;
    }
    .monitor-card:hover .btn-delete { color: var(--muted); }
    .btn-delete:hover { color: var(--red) !important; }

    .monitors-empty { color: var(--muted); font-size: 12px; text-align: center; padding: 32px 0; }

    /* ── Right column: detail panel ── */
    .detail-panel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      min-width: 0;
    }
    .workspace.detail-open .detail-panel { display: block; }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }
    .detail-name { font-size: 17px; font-weight: 700; }
    .detail-url  { font-size: 11px; color: var(--accent); margin-top: 3px; }
    .btn-close {
      background: none; border: 1px solid var(--border); border-radius: 5px;
      color: var(--muted); cursor: pointer; font-size: 13px; padding: 3px 8px;
      flex-shrink: 0;
    }
    .btn-close:hover { border-color: var(--muted); color: var(--text); }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-value.good { color: var(--green); }
    .stat-value.warn { color: var(--yellow); }
    .stat-value.bad  { color: var(--red); }

    /* ── Response time chart ── */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .chart-title {
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .chart-title span { font-size: 11px; color: var(--text); text-transform: none; letter-spacing: 0; }
    svg.rt-chart { width: 100%; height: 140px; display: block; overflow: visible; }

    /* ── Outages section ── */
    .outages-section { }
    .outages-title {
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px;
    }
    .outage-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .outage-item.ongoing  { border-left-color: var(--red); }
    .outage-item.resolved { border-left-color: var(--muted); }
    .outage-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; }
    .outage-ts  { font-size: 11px; color: var(--muted); }
    .outage-dur { font-size: 11px; font-weight: 600; }
    .outage-dur.ongoing { color: var(--red); }
    .outage-dur.resolved { color: var(--muted); }
    .outage-cause { font-size: 12px; color: var(--text); line-height: 1.5; margin-bottom: 6px; }
    .outage-remediation {
      font-size: 11px; color: var(--muted); line-height: 1.6;
      background: var(--bg); border-radius: 5px; padding: 8px 10px; margin-top: 6px;
    }
    .outage-pending { font-size: 11px; color: var(--muted); font-style: italic; }
    .no-outages { font-size: 12px; color: var(--muted); text-align: center; padding: 20px 0; }

    .loading-msg { color: var(--muted); font-size: 12px; padding: 20px 0; text-align: center; }

    @media (max-width: 700px) {
      .workspace.detail-open .monitors-col { display: none; }
      .workspace.detail-open .detail-panel { display: block; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Resilo<span>AI</span></div>
  <div class="spacer"></div>
  <div class="ts" id="clockEl"></div>

  <div id="slugArea" style="display:flex;align-items:center;gap:6px;">
    <a id="statusPageLink" href="#" target="_blank"
       style="font-size:11px;color:#58a6ff;border:1px solid #30363d;border-radius:5px;padding:4px 10px;text-decoration:none;white-space:nowrap;">
      ↗ Status Page
    </a>
    <button id="editSlugBtn" onclick="showSlugEdit(event)"
            style="font-size:11px;background:none;border:1px solid #30363d;border-radius:5px;padding:4px 8px;color:#8b949e;cursor:pointer;">
      ✏
    </button>
    <div id="slugEditWrap" style="display:none;align-items:center;gap:6px;">
      <input id="slugInput" type="text" maxlength="30" placeholder="your-slug"
             style="font-size:11px;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:4px 8px;color:#e6edf3;width:140px;" />
      <button onclick="saveSlug()"
              style="font-size:11px;background:#238636;border:none;border-radius:5px;padding:4px 10px;color:#fff;cursor:pointer;">Save</button>
      <button onclick="hideSlugEdit()"
              style="font-size:11px;background:none;border:1px solid #30363d;border-radius:5px;padding:4px 8px;color:#8b949e;cursor:pointer;">✕</button>
      <span id="slugEditMsg" style="font-size:11px;color:#f85149;"></span>
    </div>
  </div>

  <form action="/auth/logout" method="post" style="margin:0;">
    <button class="btn-logout" type="submit">Sign out</button>
  </form>
</header>

<div class="workspace" id="workspace">

  <!-- ── Left: monitor list ── -->
  <div class="monitors-col" id="monitorsCol">
    <div class="section-title">
      URL Monitors
      <span class="badge" id="monitorCount">0</span>
      <span style="margin-left:auto;font-size:10px;color:var(--muted);" id="monitorRefreshLabel"></span>
    </div>

    <form class="add-monitor-form" id="addMonitorForm">
      <div class="form-field">
        <label>Name</label>
        <input type="text" name="name" placeholder="My API" required />
      </div>
      <div class="form-field">
        <label>URL</label>
        <input type="url" name="url" placeholder="https://example.com" required />
      </div>
      <div class="form-field">
        <label>Interval</label>
        <select name="interval">
          <option value="60">Every 1 min</option>
          <option value="300">Every 5 min</option>
          <option value="600">Every 10 min</option>
          <option value="1800">Every 30 min</option>
        </select>
      </div>
      <button type="submit" class="btn-add" id="btnAddMonitor">+ Add</button>
    </form>

    <div class="monitor-grid" id="monitorGrid">
      <div class="monitors-empty" id="monitorEmpty">No monitors yet — add one above</div>
    </div>
  </div>

  <!-- ── Right: detail panel ── -->
  <div class="detail-panel" id="detailPanel">
    <div class="loading-msg" id="detailLoading">Select a monitor to see details</div>
  </div>

</div><!-- /workspace -->

<script>
// ── Injected by server ──────────────────────────────────────────
const AUTH_TOKEN = document.querySelector('meta[name="AUTH_TOKEN"]')?.content || '';
const USER_SLUG  = document.querySelector('meta[name="USER_SLUG"]')?.content  || '';

// ── Helpers ─────────────────────────────────────────────────────
function authHeaders(extra) {
  return Object.assign({ 'Content-Type': 'application/json',
    ...(AUTH_TOKEN ? { 'Authorization': `Bearer ${AUTH_TOKEN}` } : {}) }, extra);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&#34;');
}

function relTime(iso) {
  if (!iso) return '—';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)   return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

function fmtDur(from, to) {
  const s = Math.floor((new Date(to) - new Date(from)) / 1000);
  if (s < 60)   return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
  return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
}

// ── Clock ───────────────────────────────────────────────────────
const clockEl = document.getElementById('clockEl');
const tickClock = () => { clockEl.textContent = new Date().toLocaleTimeString(); };
tickClock(); setInterval(tickClock, 1000);

// ── Slug editor ─────────────────────────────────────────────────
let currentSlug = USER_SLUG;

function applySlug(slug) {
  currentSlug = slug;
  const link = document.getElementById('statusPageLink');
  const area = document.getElementById('slugArea');
  if (slug) {
    link.href  = `/status/${slug}`;
    link.title = `resilo-ai.fly.dev/status/${slug}`;
    area.style.display = 'flex';
  } else {
    area.style.display = 'none';
  }
}

function showSlugEdit(e) {
  e && e.preventDefault();
  document.getElementById('slugInput').value = currentSlug;
  document.getElementById('slugEditMsg').textContent = '';
  document.getElementById('slugEditWrap').style.display = 'flex';
  document.getElementById('editSlugBtn').style.display  = 'none';
  document.getElementById('slugInput').focus();
}

function hideSlugEdit() {
  document.getElementById('slugEditWrap').style.display = 'none';
  document.getElementById('editSlugBtn').style.display  = '';
}

async function saveSlug() {
  const val = document.getElementById('slugInput').value.trim().toLowerCase();
  const msg = document.getElementById('slugEditMsg');
  msg.style.color = '#f85149';
  if (val.length < 3 || val.length > 30) { msg.textContent = 'Must be 3–30 characters.'; return; }
  if (!/^[a-z0-9][a-z0-9-]*[a-z0-9]$/.test(val)) { msg.textContent = 'Letters, numbers, hyphens only.'; return; }
  try {
    const res  = await fetch('/api/profile/slug', { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ slug: val }) });
    const data = await res.json();
    if (!res.ok) { msg.textContent = data.error || 'Failed to save.'; return; }
    applySlug(data.slug);
    msg.style.color = '#3fb950';
    msg.textContent = '✓ Saved';
    setTimeout(hideSlugEdit, 800);
  } catch { msg.textContent = 'Network error.'; }
}

document.getElementById('slugInput')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') saveSlug();
  if (e.key === 'Escape') hideSlugEdit();
});

applySlug(USER_SLUG);

// ── Monitor list ─────────────────────────────────────────────────
let monitorsData  = [];
let selectedId    = null;

const monitorGrid    = document.getElementById('monitorGrid');
const monitorCountEl = document.getElementById('monitorCount');

function isUp(m) {
  if (m.last_status == null) return null;
  return m.last_status >= 200 && m.last_status < 300;
}

function renderMonitors(monitors) {
  monitorsData = monitors;
  monitorCountEl.textContent = monitors.length;

  monitorGrid.querySelectorAll('.monitor-card').forEach(el => el.remove());
  document.getElementById('monitorEmpty')?.remove();

  if (monitors.length === 0) {
    const el = document.createElement('div');
    el.className = 'monitors-empty'; el.id = 'monitorEmpty';
    el.textContent = 'No monitors yet — add one above';
    monitorGrid.appendChild(el);
    return;
  }

  monitors.forEach(m => {
    const up  = isUp(m);
    const cls = up === null ? 'unknown' : up ? 'up' : 'down';
    const lbl = up === null ? 'PENDING'  : up ? 'UP'  : 'DOWN';

    const card = document.createElement('div');
    card.className = `monitor-card ${cls}${m.id === selectedId ? ' selected' : ''}`;
    card.dataset.id = m.id;
    card.onclick = () => selectMonitor(m.id);

    const latency  = m.last_latency_ms != null ? `${m.last_latency_ms}ms` : '—';
    const interval = m.interval_seconds < 120
      ? `${m.interval_seconds}s`
      : m.interval_seconds < 3600 ? `${Math.floor(m.interval_seconds/60)}m` : `${Math.floor(m.interval_seconds/3600)}h`;
    const errHtml = (m.last_error && !up)
      ? `<div class="monitor-error" title="${escHtml(m.last_error)}">${escHtml(m.last_error.slice(0,80))}</div>` : '';

    card.innerHTML = `
      <div class="monitor-top">
        <span class="monitor-name" title="${escHtml(m.name)}">${escHtml(m.name)}</span>
        <span class="status-badge ${cls}">${lbl}</span>
      </div>
      <div class="monitor-url">${escHtml(m.url)}</div>
      ${errHtml}
      <div class="monitor-meta">
        <span>⏱ ${latency}</span>
        <span>🕐 ${relTime(m.last_checked_at)}</span>
        <span>↻ ${interval}</span>
      </div>
      <button class="btn-delete" title="Delete" onclick="event.stopPropagation();deleteMonitor('${m.id}')">✕</button>
    `;
    monitorGrid.appendChild(card);
  });
}

async function fetchMonitors() {
  try {
    const res = await fetch('/api/monitors', { credentials: 'include' });
    if (res.status === 401) { location.href = '/login'; return; }
    if (!res.ok) return;
    const list = await res.json();
    renderMonitors(list || []);
    document.getElementById('monitorRefreshLabel').textContent = `Updated ${new Date().toLocaleTimeString()}`;
    // Refresh detail panel data silently if one is open
    if (selectedId) refreshDetailStats();
  } catch (e) { console.error('fetchMonitors:', e); }
}

async function deleteMonitor(id) {
  if (!confirm('Delete this monitor?')) return;
  const res = await fetch(`/api/monitors/${id}`, { method: 'DELETE', credentials: 'include' });
  if (res.ok) {
    if (selectedId === id) closeDetail();
    fetchMonitors();
  }
}

document.getElementById('addMonitorForm').addEventListener('submit', async e => {
  e.preventDefault();
  const form = e.target;
  const btn  = document.getElementById('btnAddMonitor');
  btn.disabled = true; btn.textContent = 'Adding…';
  try {
    const res = await fetch('/api/monitors', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: form.name.value.trim(),
        url:  form.url.value.trim(),
        interval_seconds: parseInt(form.interval.value, 10),
      }),
    });
    if (res.status === 401) { location.href = '/login'; return; }
    if (res.ok) { form.reset(); await fetchMonitors(); }
    else { alert('Error: ' + await res.text()); }
  } catch (e) { console.error(e); }
  finally { btn.disabled = false; btn.textContent = '+ Add'; }
});

// ── Detail panel ─────────────────────────────────────────────────
const workspace   = document.getElementById('workspace');
const detailPanel = document.getElementById('detailPanel');

function closeDetail() {
  selectedId = null;
  workspace.classList.remove('detail-open');
  detailPanel.innerHTML = '<div class="loading-msg">Select a monitor to see details</div>';
  monitorGrid.querySelectorAll('.monitor-card').forEach(c => c.classList.remove('selected'));
}

async function selectMonitor(id) {
  if (selectedId === id) { closeDetail(); return; }
  selectedId = id;

  // Mark selected card
  monitorGrid.querySelectorAll('.monitor-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.id === id));

  workspace.classList.add('detail-open');
  detailPanel.innerHTML = '<div class="loading-msg">Loading…</div>';

  const m = monitorsData.find(x => x.id === id);
  if (!m) return;

  // Parallel fetch: results + outages
  const [resultsRes, outagesRes] = await Promise.all([
    fetch(`/api/monitors/${id}/results?limit=50`, { credentials: 'include' }),
    fetch(`/api/monitors/${id}/outages`,          { credentials: 'include' }),
  ]);

  const results = resultsRes.ok  ? (await resultsRes.json()) : [];
  const outages = outagesRes.ok  ? (await outagesRes.json()) : [];

  renderDetail(m, results || [], outages || []);
}

async function refreshDetailStats() {
  if (!selectedId) return;
  const m = monitorsData.find(x => x.id === selectedId);
  if (!m) return;
  const [resultsRes, outagesRes] = await Promise.all([
    fetch(`/api/monitors/${selectedId}/results?limit=50`, { credentials: 'include' }),
    fetch(`/api/monitors/${selectedId}/outages`,          { credentials: 'include' }),
  ]);
  const results = resultsRes.ok ? (await resultsRes.json()) : [];
  const outages = outagesRes.ok ? (await outagesRes.json()) : [];
  renderDetail(m, results || [], outages || []);
}

function renderDetail(m, results, outages) {
  const up  = isUp(m);
  const cls = up === null ? 'unknown' : up ? 'up' : 'down';
  const lbl = up === null ? 'PENDING'  : up ? 'UP'  : 'DOWN';

  // Stats: uptime from results, outages this month
  const now  = Date.now();
  const week = 7 * 24 * 60 * 60 * 1000;
  const weekResults = results.filter(r => now - new Date(r.checked_at) < week);
  const upCount  = weekResults.filter(r => r.status_code >= 200 && r.status_code < 300).length;
  const uptimePct = weekResults.length > 0 ? (upCount / weekResults.length * 100).toFixed(1) : '—';

  const monthStart  = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
  const monthOutages = outages.filter(o => new Date(o.started_at) >= monthStart).length;

  const avgLatency = results.length > 0
    ? Math.round(results.filter(r => r.latency_ms != null).reduce((s, r) => s + r.latency_ms, 0)
        / results.filter(r => r.latency_ms != null).length)
    : null;

  const uptimeClass = uptimePct === '—' ? '' : +uptimePct >= 99 ? 'good' : +uptimePct >= 95 ? 'warn' : 'bad';

  detailPanel.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-name">
          <span class="status-badge ${cls}" style="font-size:11px;margin-right:8px;">${lbl}</span>${escHtml(m.name)}
        </div>
        <div class="detail-url">${escHtml(m.url)}</div>
      </div>
      <button class="btn-close" onclick="closeDetail()">✕</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">7-day uptime</div>
        <div class="stat-value ${uptimeClass}">${uptimePct === '—' ? '—' : uptimePct + '%'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Outages this month</div>
        <div class="stat-value ${monthOutages === 0 ? 'good' : monthOutages <= 2 ? 'warn' : 'bad'}">${monthOutages}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg response</div>
        <div class="stat-value">${avgLatency != null ? avgLatency + 'ms' : '—'}</div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-title">
        Response time — last ${results.length} checks
        <span>${relTime(m.last_checked_at)}</span>
      </div>
      ${buildChart(results)}
    </div>

    <div class="outages-section">
      <div class="outages-title">Recent outages</div>
      ${buildOutages(outages.slice(0, 5))}
    </div>
  `;
}

// ── SVG line chart ───────────────────────────────────────────────
function buildChart(results) {
  if (!results.length) return '<div class="loading-msg">No data yet</div>';

  // Results come newest-first from API; reverse for left→right time order
  const pts = [...results].reverse();

  const W = 600, H = 120, PX = 10, PY = 10;
  const latencies = pts.map(r => r.latency_ms ?? 0);
  const maxL = Math.max(...latencies, 1);

  const x = (i) => PX + (i / Math.max(pts.length - 1, 1)) * (W - PX * 2);
  const y = (v)  => PY + (1 - v / maxL) * (H - PY * 2);

  // Line path
  const pathD = pts.map((r, i) => `${i === 0 ? 'M' : 'L'}${x(i).toFixed(1)},${y(r.latency_ms ?? 0).toFixed(1)}`).join(' ');

  // Area fill (close below)
  const areaD = pathD + ` L${x(pts.length-1).toFixed(1)},${H} L${PX},${H} Z`;

  // Dots — colored by status
  const dots = pts.map((r, i) => {
    const ok  = r.status_code >= 200 && r.status_code < 300;
    const col = !r.status_code || r.error ? '#f85149' : ok ? '#3fb950' : '#f85149';
    return `<circle cx="${x(i).toFixed(1)}" cy="${y(r.latency_ms ?? 0).toFixed(1)}" r="3" fill="${col}" opacity=".85"/>`;
  }).join('');

  // Y-axis label
  const yLabel = `${maxL}ms`;

  return `
    <svg class="rt-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#58a6ff" stop-opacity=".25"/>
          <stop offset="100%" stop-color="#58a6ff" stop-opacity=".02"/>
        </linearGradient>
      </defs>
      <path d="${areaD}" fill="url(#cg)"/>
      <path d="${pathD}" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      <text x="${PX}" y="${PY - 2}" fill="#8b949e" font-size="9">${escHtml(yLabel)}</text>
      <text x="${PX}" y="${H - 2}"  fill="#8b949e" font-size="9">0ms</text>
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px;">
      <span>${pts.length > 0 ? new Date(pts[0].checked_at).toLocaleString() : ''}</span>
      <span style="display:flex;gap:10px;">
        <span style="color:var(--green);">● OK</span>
        <span style="color:var(--red);">● Error</span>
      </span>
      <span>${pts.length > 0 ? new Date(pts[pts.length-1].checked_at).toLocaleString() : ''}</span>
    </div>`;
}

// ── Outage list ──────────────────────────────────────────────────
function buildOutages(outages) {
  if (!outages.length) return '<div class="no-outages">No outages recorded — great!</div>';

  return outages.map(o => {
    const ongoing = !o.resolved_at;
    const dur     = ongoing ? 'Ongoing' : fmtDur(o.started_at, o.resolved_at);
    const remHtml = o.remediation
      ? `<div class="outage-remediation">${escHtml(o.remediation).replace(/\n/g,'<br>')}</div>` : '';
    return `
      <div class="outage-item ${ongoing ? 'ongoing' : 'resolved'}">
        <div class="outage-row">
          <span class="outage-ts">${new Date(o.started_at).toLocaleString()}</span>
          <span class="outage-dur ${ongoing ? 'ongoing' : 'resolved'}">${dur}</span>
        </div>
        ${o.root_cause
          ? `<div class="outage-cause">${escHtml(o.root_cause)}</div>${remHtml}`
          : '<div class="outage-pending">AI analysis pending…</div>'}
      </div>`;
  }).join('');
}

// ── Boot ─────────────────────────────────────────────────────────
fetchMonitors();
setInterval(fetchMonitors, 30_000);
</script>
</body>
